<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eclipse D7">
<meta name="application-name" content="Eclipse D7">
<meta name="theme-color" content="#0e1520">
<meta name="description" content="Eclipse Restaurant Deck 7 — Floor Manager · Sun Princess">
<title>Eclipse · Deck 7 — Floor Manager</title>

<!-- Firebase SDKs (compat version — no build tools needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- PWA Manifest injected by JS on load (see bottom of script) -->
<link rel="manifest" id="pwa-manifest">

<!-- Apple touch icon -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%23080c14'/><circle cx='90' cy='90' r='52' fill='none' stroke='%23c9a84c' stroke-width='7'/><text x='90' y='107' text-anchor='middle' font-family='serif' font-size='60' fill='%23c9a84c'>E</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cinzel:wght@400;600&display=swap');

:root {
  --bg: #080c14;
  --panel: #0e1520;
  --card: #131d2e;
  --border: #1a2840;
  --border2: #243552;
  --text: #d8e4f0;
  --text-dim: #5a7090;
  --text-mid: #8da4be;
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.15);
  --s1: #f4a261;
  --s1-bg: rgba(244,162,97,0.85);
  --s2: #e63946;
  --s2-bg: rgba(230,57,70,0.85);
  --s3: #7b2fbe;
  --s3-bg: rgba(123,47,190,0.85);
  --avail: rgba(15,35,70,0.72);
  --avail-border: rgba(80,140,220,0.9);
  --teal: #2dd4bf;
  --marker-size: 26px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Mono', 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ─── TOOLBAR ─── */
#toolbar {
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 7px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  z-index: 20;
  -webkit-user-select: none;
  user-select: none;
}

#toolbar h1 {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--gold);
  letter-spacing: 3px;
  white-space: nowrap;
  margin-right: 4px;
}

.sep { width: 1px; height: 26px; background: var(--border2); flex-shrink: 0; }

.seating-group { display: flex; gap: 5px; }

.s-legend {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 11px;
  min-height: 38px;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  background: transparent;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  white-space: nowrap;
}
.s-legend .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.s-legend .s1d { background: var(--s1); }
.s-legend .s2d { background: var(--s2); }
.s-legend .s3d { background: var(--s3); }

.action-group { display: flex; gap: 5px; }

.a-btn {
  padding: 7px 13px;
  min-height: 38px;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  background: transparent;
  color: var(--text-mid);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.a-btn:hover { border-color: var(--gold); color: var(--text); }
.a-btn.on { background: rgba(45,212,191,0.1); border-color: var(--teal); color: var(--teal); }
.a-btn.find-btn { border-color: rgba(201,168,76,0.4); color: var(--gold); }
.a-btn.find-btn:hover { background: var(--gold-dim); border-color: var(--gold); }
.a-btn.find-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

/* ─── FINDER BAR ─── */
#finder-bar {
  flex-shrink: 0;
  background: var(--card);
  border-bottom: 1px solid var(--border2);
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.25s cubic-bezier(.4,0,.2,1), padding 0.25s;
  padding: 0 14px;
}
#finder-bar.open {
  max-height: 64px;
  padding: 7px 14px;
}
#finder-inner {
  display: flex; align-items: center; gap: 8px; flex-wrap: nowrap;
}
.finder-label {
  font-size: 9px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1.2px;
  white-space: nowrap; flex-shrink: 0;
}
.finder-sizes { display: flex; gap: 5px; }
.fsz-btn {
  padding: 7px 14px; min-height: 36px;
  border: 1.5px solid var(--border2);
  border-radius: 20px;
  background: transparent; color: var(--text-dim);
  font-family: 'DM Mono', monospace; font-size: 11px;
  cursor: pointer; white-space: nowrap;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.fsz-btn:hover { border-color: var(--gold); color: var(--text); }
.fsz-btn.active {
  background: var(--gold); border-color: var(--gold);
  color: #1a0a00; font-weight: 700;
}
.fsz-btn.sharing-filter { border-color: rgba(45,212,191,0.4); color: var(--text-dim); }
.fsz-btn.sharing-filter:hover { border-color: var(--teal); color: var(--teal); }
.fsz-btn.sharing-filter.active { background: var(--teal); border-color: var(--teal); color: #001a17; font-weight: 700; }
.finder-sep { width: 1px; height: 22px; background: var(--border2); flex-shrink: 0; margin: 0 4px; }
.finder-clear {
  padding: 7px 12px; min-height: 36px;
  border: 1.5px solid rgba(230,57,70,0.3);
  border-radius: 20px; background: transparent;
  color: rgba(230,57,70,0.6); font-family: 'DM Mono', monospace;
  font-size: 10px; cursor: pointer; white-space: nowrap;
  touch-action: manipulation; display: none;
  transition: all 0.15s;
}
.finder-clear.show { display: block; }
.finder-clear:hover { border-color: var(--s2); color: var(--s2); }

/* Finder highlights */
.tm.finder-match {
  animation: finder-pulse 1.5s ease-in-out infinite !important;
  z-index: 10;
}
.tm.finder-match-sharing {
  animation: finder-pulse-teal 1.5s ease-in-out infinite !important;
  z-index: 10;
}
.tm.finder-dim { opacity: 0.15; }

@keyframes finder-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0), 0 1px 4px rgba(0,0,0,0.5); transform: translate(-50%,-50%) scale(1); }
  50%      { box-shadow: 0 0 0 7px rgba(201,168,76,0.4), 0 0 16px rgba(201,168,76,0.3); transform: translate(-50%,-50%) scale(1.15); }
}
@keyframes finder-pulse-teal {
  0%,100% { box-shadow: 0 0 0 0 rgba(45,212,191,0), 0 1px 4px rgba(0,0,0,0.5); transform: translate(-50%,-50%) scale(1); }
  50%      { box-shadow: 0 0 0 7px rgba(45,212,191,0.4), 0 0 16px rgba(45,212,191,0.3); transform: translate(-50%,-50%) scale(1.15); }
}
.a-btn.settings-btn:hover { background: var(--gold-dim); border-color: var(--gold); }
.a-btn.settings-btn.open { background: var(--gold-dim); border-color: var(--gold); }

/* ─── SETTINGS DRAWER ─── */
#settings-drawer {
  position: fixed;
  top: 0; right: 0;
  width: 320px;
  max-width: 96vw;
  height: 100%;
  background: var(--panel);
  border-left: 1px solid var(--border2);
  z-index: 300;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(.4,0,.2,1);
  box-shadow: -8px 0 32px rgba(0,0,0,0.5);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#settings-drawer.open { transform: translateX(0); }
#settings-scrim {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 299;
  display: none;
  backdrop-filter: blur(2px);
}
#settings-scrim.show { display: block; }

.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.drawer-header h2 {
  font-family: 'Cinzel', serif; font-size: 15px;
  color: var(--gold); letter-spacing: 2px;
}
.drawer-close {
  width: 36px; height: 36px; border: 1px solid var(--border2);
  background: transparent; color: var(--text-mid);
  border-radius: 5px; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
.drawer-close:hover { border-color: var(--gold); color: var(--gold); }

.drawer-section {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}
.drawer-section-title {
  font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-dim); margin-bottom: 12px;
}

/* Map slot cards */
.map-slot {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 12px 14px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
}
.map-slot-icon {
  width: 36px; height: 36px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  border: 1px solid var(--border2);
  background: var(--card);
}
.map-slot-info { flex: 1; min-width: 0; }
.map-slot-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.map-slot-status { font-size: 11px; margin-top: 2px; }
.map-slot-status.loaded { color: var(--teal); }
.map-slot-status.empty  { color: rgba(230,57,70,0.8); }
.map-slot-btn {
  padding: 7px 12px; border: 1.5px solid var(--border2);
  background: transparent; color: var(--text-mid);
  border-radius: 5px; font-family: 'DM Mono', monospace;
  font-size: 10px; cursor: pointer; white-space: nowrap;
  touch-action: manipulation; min-height: 38px;
  flex-shrink: 0;
}
.map-slot-btn:hover, .map-slot-btn:active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* Dark mode toggle row */
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
}
.toggle-row-label { font-size: 12px; color: var(--text-mid); }
.toggle-row-sub   { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.map-toggle {
  display: flex; gap: 0; border-radius: 6px; overflow: hidden;
  border: 1.5px solid var(--border2);
}
.map-toggle-opt {
  padding: 8px 14px; font-family: 'DM Mono', monospace;
  font-size: 11px; cursor: pointer; touch-action: manipulation;
  background: transparent; border: none; color: var(--text-dim);
  min-height: 38px; min-width: 70px; text-align: center;
  transition: all 0.15s;
}
.map-toggle-opt.active { background: var(--gold); color: #1a0a00; font-weight: 600; }
.map-toggle-opt:not(.active):hover { color: var(--text); background: var(--border); }

/* Drawer tool buttons */
.drawer-tool-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 12px 14px;
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 7px; color: var(--text-mid);
  font-family: 'DM Mono', monospace; font-size: 12px;
  cursor: pointer; margin-bottom: 8px;
  touch-action: manipulation; text-align: left;
  transition: all 0.15s;
}
.drawer-tool-btn:hover, .drawer-tool-btn:active { border-color: var(--gold); color: var(--text); background: var(--gold-dim); }
.drawer-tool-btn .dtb-icon { font-size: 18px; flex-shrink: 0; }
.drawer-tool-btn .dtb-info {}
.drawer-tool-btn .dtb-title { font-size: 12px; color: var(--text); font-weight: 500; }
.drawer-tool-btn .dtb-sub   { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.drawer-tool-btn.active-tool { border-color: var(--teal); background: rgba(45,212,191,0.08); }
.drawer-tool-btn.active-tool .dtb-title { color: var(--teal); }
.a-btn.export-btn { border-color: rgba(45,212,191,0.4); color: var(--teal); }
.a-btn.export-btn:hover { background: rgba(45,212,191,0.08); border-color: var(--teal); }
.a-btn.reset-all { border-color: rgba(230,57,70,0.4); color: rgba(230,57,70,0.7); }
.a-btn.reset-all:hover { border-color: var(--s2); color: var(--s2); background: rgba(230,57,70,0.08); }
.a-btn.darkmap-btn { border-color: rgba(201,168,76,0.35); color: var(--text-dim); font-size: 14px; padding: 7px 10px; min-width: 38px; justify-content: center; }
.a-btn.darkmap-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.a-btn.darkmap-btn.is-dark { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* ─── DARK MAP MODE — markers flip to glow style on black bg ─── */
.dark-map #map-wrapper { background: #000; }
.dark-map .tm {
  --avail: rgba(200,225,255,0.10);
  --avail-border: rgba(140,190,255,0.75);
  color: rgba(180,215,255,0.85);
  box-shadow: 0 0 5px rgba(100,160,255,0.25), 0 1px 3px rgba(0,0,0,0.4);
}
.dark-map .tm:hover {
  box-shadow: 0 0 12px rgba(100,160,255,0.55), 0 2px 8px rgba(0,0,0,0.5) !important;
}

/* ─── COVERS SPINNER ─── */
.covers-spinner {
  display: flex; align-items: center; gap: 0; margin-top: 4px;
}
.cv-btn {
  width: 44px; height: 44px; border: 1.5px solid var(--border2);
  background: var(--bg); color: var(--text-mid);
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  transition: background 0.1s, color 0.1s; flex-shrink: 0;
}
.cv-btn:first-child { border-radius: 5px 0 0 5px; }
.cv-btn:last-child  { border-radius: 0 5px 5px 0; }
.cv-btn:active { background: var(--border2); color: var(--text); }
.cv-val {
  flex: 1; height: 44px; border-top: 1.5px solid var(--border2); border-bottom: 1.5px solid var(--border2);
  border-left: none; border-right: none;
  background: var(--bg); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 600;
  text-align: center; display: flex; align-items: center; justify-content: center;
  user-select: none; min-width: 54px;
}

/* ─── STATEROOM TAGS ─── */
.stateroom-tags {
  display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; min-height: 38px;
  padding: 6px 8px; background: var(--bg); border: 1.5px solid var(--border2);
  border-radius: 5px; align-content: flex-start;
}
.sr-tag {
  display: flex; align-items: center; gap: 4px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 4px; padding: 3px 8px; font-size: 12px; color: var(--text);
}
.sr-tag .sr-del {
  color: var(--text-dim); font-size: 14px; cursor: pointer; line-height: 1;
  padding: 0 1px; touch-action: manipulation;
}
.sr-tag .sr-del:hover { color: var(--s2); }
.sr-add-row {
  display: flex; gap: 6px; margin-top: 6px;
}
.sr-input {
  flex: 1; background: var(--bg); border: 1.5px solid var(--border2);
  color: var(--text); padding: 8px 10px; border-radius: 5px;
  font-family: 'DM Mono', monospace; font-size: 14px; outline: none;
  min-height: 44px; -webkit-appearance: none;
}
.sr-input:focus { border-color: var(--gold); }
.sr-add-btn {
  padding: 8px 14px; background: var(--border2); border: none;
  color: var(--text-mid); border-radius: 5px; font-family: 'DM Mono', monospace;
  font-size: 13px; cursor: pointer; min-height: 44px; touch-action: manipulation;
  white-space: nowrap;
}
.sr-add-btn:active { background: var(--gold); color: #1a0a00; }
#search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
#search-input {
  background: var(--bg);
  border: 1.5px solid var(--border2);
  color: var(--text);
  padding: 6px 30px 6px 10px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  width: 170px;
  min-height: 38px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
#search-input:focus { border-color: var(--gold); }
#search-input::placeholder { color: var(--text-dim); }
#search-clear {
  position: absolute;
  right: 7px;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  display: none;
  background: none;
  border: none;
  padding: 0;
  line-height: 1;
}
#search-clear.show { display: block; }
.tm.search-match {
  box-shadow: 0 0 0 3px var(--gold), 0 0 14px rgba(201,168,76,0.5) !important;
  z-index: 10;
  animation: search-pulse 1.5s ease-in-out 3;
}
.tm.search-dim { opacity: 0.2; }
@keyframes search-pulse {
  0%,100% { box-shadow: 0 0 0 3px var(--gold), 0 0 14px rgba(201,168,76,0.5); }
  50%      { box-shadow: 0 0 0 5px var(--gold), 0 0 24px rgba(201,168,76,0.7); }
}

/* ─── USER NAME PROMPT ─── */
#name-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 700;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
#name-box {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 32px 28px 26px;
  width: 340px; max-width: 96vw;
  text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,0.7);
  animation: bc-in 0.3s cubic-bezier(.2,.8,.3,1);
}
#name-box .nb-ship { font-size:9px; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
#name-box h2 { font-family:'Cinzel',serif; font-size:20px; color:var(--gold); letter-spacing:3px; margin-bottom:4px; }
#name-box .nb-sub { font-size:10px; color:var(--text-dim); margin-bottom:22px; line-height:1.6; }
#user-badge { font-size:9px; color:var(--gold); display:flex; align-items:center; gap:5px; cursor:pointer; flex-shrink:0; }
#user-badge:hover { color:var(--gold2); }
#user-badge .ub-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); }
#broadcast-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 500;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
#broadcast-overlay.show { display: flex; }
#broadcast-box {
  background: var(--panel);
  border: 2px solid var(--gold);
  border-radius: 14px;
  padding: 28px 26px 22px;
  width: 340px; max-width: 95vw;
  text-align: center;
  box-shadow: 0 0 40px rgba(201,168,76,0.25), 0 20px 60px rgba(0,0,0,0.7);
  animation: bc-in 0.3s cubic-bezier(.2,.8,.3,1);
}
@keyframes bc-in {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
#broadcast-box .bc-icon { font-size: 36px; margin-bottom: 10px; }
#broadcast-box .bc-title {
  font-family: 'Cinzel', serif; font-size: 11px;
  color: var(--gold); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 14px;
}
#broadcast-box .bc-msg {
  font-size: 15px; color: var(--text); line-height: 1.6;
  margin-bottom: 20px; padding: 12px 10px;
  background: var(--bg); border-radius: 7px;
  border: 1px solid var(--border2);
}
#broadcast-box .bc-ok {
  padding: 11px 32px; background: var(--gold); color: #1a0a00;
  border: none; border-radius: 6px; font-family: 'DM Mono', monospace;
  font-size: 13px; font-weight: 700; cursor: pointer;
  touch-action: manipulation; min-height: 44px;
}
#broadcast-box .bc-ok:active { background: #d4b050; }

/* ─── RESET TOAST ─── */
#toast-container {
  position: fixed; top: 58px; right: 16px;
  z-index: 600; display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.reset-toast {
  background: var(--card);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--teal);
  border-radius: 8px;
  padding: 9px 14px;
  font-size: 11px; color: var(--text);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  animation: toast-in 0.3s cubic-bezier(.2,.8,.3,1);
  max-width: 260px;
}
.reset-toast.out { animation: toast-out 0.3s ease forwards; }
